<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>FloodFill2D Demo</title>
        <style>
            body {
                font-family: system-ui, Arial, sans-serif;
                background: #f6f7f9;
                color: #222;
                display: flex;
                flex-direction: column;
                align-items: center;
                margin: 0;
                padding: 40px;
            }

            h1 {
                margin-bottom: 10px;
            }

            .instructions {
                margin-bottom: 20px;
                font-size: 15px;
                color: #555;
            }

            canvas {
                border: 1px solid #ccc;
                background: white;
            }

            .controls {
                margin-bottom: 20px;
                display: flex;
                gap: 20px;
                align-items: center;
            }

            button {
                padding: 8px 14px;
                border-radius: 6px;
                border: 1px solid #ccc;
                background: #ffffff;
                color: #333;
                cursor: pointer;
                transition: background 0.2s;
            }

            button:hover {
                background: #f0f0f0;
            }

            label {
                font-size: 14px;
            }

            .legend {
                margin-top: 20px;
                font-size: 13px;
                color: #444;
            }

            .legend span {
                margin-right: 14px;
            }

            .box {
                width: 12px;
                height: 12px;
                display: inline-block;
                margin-right: 6px;
                border: 1px solid #bbb;
                vertical-align: middle;
            }

            .empty {
                background: #eeeeee;
            }

            .wall {
                background: #444;
            }

            .fill {
                background: #4caf50;
            }
        </style>
      <script type="module" crossorigin src="/floodfill2d/assets/demo-Bb97drh5.js"></script>
    </head>
    <body>
        <h1>FloodFill2D Demo</h1>
        <div class="instructions">
            Click on an <strong>empty cell</strong> to run the flood fill algorithm.
        </div>
        <div class="controls">
            <label>Wall % <input type="range" id="density" min="20" max="80" value="30"></label>
            <button id="generate">Generate new walls</button>
            <button id="clear">Clear fill</button>
        </div>
        <canvas id="canvas" width="600" height="600"></canvas>
        <div class="legend">
            <span><span class="box empty"></span>empty</span>
            <span><span class="box wall"></span>wall</span>
            <span><span class="box fill"></span>flood fill</span>
        </div>
    </body>
</html>
